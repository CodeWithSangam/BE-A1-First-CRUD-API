  <h1>My Tasks</h1>

  </form>

  <ul id="taskList"></ul>

      <h4>Request — what was sent</h4>

<script>
  const API_URL = "http://localhost:8000";
  const taskList = document.getElementById("taskList");
  const reqPane = document.getElementById("reqPane");
  const resPane = document.getElementById("resPane");

  function methodBadge(method) {
    return `<span class="method m-${method}">${method}</span>`;
  }

  function showRequest(method, url, body) {
    let lines = [`${methodBadge(method)} ${url}`, "Host: localhost:8000"];
    if (body !== undefined) {
      lines.push("Content-Type: application/json", "", JSON.stringify(body, null, 2));
    }
    reqPane.innerHTML = lines.join("\n");
  }

  function showResponse(status, ok, body) {
    const statusClass = ok ? "status-ok" : "status-bad";
    resPane.innerHTML =
      `<span class="${statusClass}">HTTP ${status}</span>\n\n` +
      JSON.stringify(body, null, 2);
  }

  async function callApi(method, path, body) {
    const url = `${API_URL}${path}`;
    showRequest(method, path, body);

    const options = { method };
    if (body !== undefined) {
      options.headers = { "Content-Type": "application/json" };
      options.body = JSON.stringify(body);
    }

    const response = await fetch(url, options);
    let data = null;
    if (response.status !== 204) {
      data = await response.json();
    }
    showResponse(response.status, response.ok, data ?? { note: "204 No Content" });
    return { response, data };
  }

  async function loadTasks() {
    const { data } = await callApi("GET", "/tasks");
    taskList.innerHTML = "";
    (data || []).forEach(task => {
      const li = document.createElement("li");
      li.className = "task";

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = task.done;
      checkbox.addEventListener("change", () => toggleDone(task));

      const span = document.createElement("span");
      span.textContent = task.title;
      if (task.done) span.classList.add("done");

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "Delete";
      deleteBtn.className = "danger";
      deleteBtn.addEventListener("click", () => deleteTask(task.id));

      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(deleteBtn);
      taskList.appendChild(li);
    });
  }

  document.getElementById("taskForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    await callApi("POST", "/tasks", { title });
    titleInput.value = "";
    loadTasks();
  });

  async function deleteTask(id) {
    await callApi("DELETE", `/tasks/${id}`);
    loadTasks();
  }

  async function toggleDone(task) {
    await callApi("PUT", `/tasks/${task.id}`, { title: task.title, done: !task.done });
    loadTasks();
  }

  loadTasks();
</script>
